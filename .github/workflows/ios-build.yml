name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar o Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Dar permissão de execução ao Gradle
        run: chmod +x gradlew

      - name: Compilar App iOS (Sem Assinatura)
        run: |
          cd iosApp
          xcodebuild clean build \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -arch arm64 \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR=$(pwd)/build/Release-iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Empacotar no formato .ipa
        run: |
          cd iosApp
          mkdir -p Payload
          mv build/Release-iphoneos/iosApp.app Payload/
          zip -r iosApp.ipa Payload

      - name: Disponibilizar o Arquivo para Download
        uses: actions/upload-artifact@v4
        with:
          name: meu-app-ios
          path: iosApp/iosApp.ipa